<!-- JS 动态效果 -->
<script>
// 轮播图
let slides = document.querySelectorAll('.carousel-slide');
let currentIndex = 0;
document.getElementById('next').addEventListener('click', () => {
    slides[currentIndex].classList.add('hidden');
    currentIndex = (currentIndex + 1) % slides.length;
    slides[currentIndex].classList.remove('hidden');
});
document.getElementById('prev').addEventListener('click', () => {
    slides[currentIndex].classList.add('hidden');
    currentIndex = (currentIndex - 1 + slides.length) % slides.length;
    slides[currentIndex].classList.remove('hidden');
});
// 自动轮播
setInterval(() => {
    slides[currentIndex].classList.add('hidden');
    currentIndex = (currentIndex + 1) % slides.length;
    slides[currentIndex].classList.remove('hidden');
}, 5000);

// 房型切换
const roomButtons = document.querySelectorAll('.room-btn');
const roomSlides = document.querySelectorAll('.room-slide');
roomButtons.forEach(btn => {
    btn.addEventListener('click', () => {
        roomButtons.forEach(b => b.classList.replace('bg-emerald-500','bg-gray-200') && b.classList.replace('text-white','text-gray-700'));
        btn.classList.add('bg-emerald-500','text-white');
        const roomId = btn.dataset.room;
        roomSlides.forEach(slide => slide.classList.add('hidden'));
        document.getElementById('room-' + roomId).classList.remove('hidden');
    });
});
</script>
