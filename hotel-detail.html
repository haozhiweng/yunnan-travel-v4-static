<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>酒店预订 - 云南旅游官网</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- Header -->
<header class="bg-white shadow fixed top-0 left-0 right-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center py-4 px-6">
    <a href="index.html" class="text-3xl font-bold text-emerald-600">云南旅游</a>
    <nav class="space-x-8 font-medium">
      <a href="index.html">首页</a>
      <a href="scenic.html">景点</a>
      <a href="hotel.html" class="underline">酒店</a>
      <a href="community.html">攻略社区</a>
      <a href="ai.html">AI行程规划</a>
    </nav>
  </div>
</header>

<main class="max-w-7xl mx-auto mt-24 px-6">

<!-- Banner -->
<section class="relative h-[420px] overflow-hidden rounded-3xl mb-8">
  <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="absolute inset-0 w-full h-full object-cover rounded-3xl">
  <div class="absolute inset-0 bg-black/40 rounded-3xl"></div>
  <div class="relative z-10 flex items-center justify-center h-full">
    <div class="text-center text-white">
      <h1 class="text-5xl font-bold mb-4">精选酒店预订</h1>
      <p class="text-xl">品质住宿，舒适体验</p>
    </div>
  </div>
</section>

<!-- 搜索栏 -->
<section class="max-w-7xl mx-auto -mt-12 relative z-20">
  <div class="bg-white rounded-3xl shadow-xl p-6">
    <div class="grid md:grid-cols-5 gap-4">
      <input type="text" placeholder="目的地" class="border rounded-xl p-4">
      <input type="date" class="border rounded-xl p-4">
      <input type="date" class="border rounded-xl p-4">
      <select class="border rounded-xl p-4">
        <option>2位成人</option>
        <option>3位成人</option>
        <option>家庭出游</option>
      </select>
      <button class="bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700">搜索</button>
    </div>
  </div>
</section>

<!-- 酒店列表 -->
<section class="max-w-7xl mx-auto py-10 px-6">
  <div class="grid md:grid-cols-3 gap-8">

    <!-- 酒店卡片示例 -->
    <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:-translate-y-2 transition">
      <img src="https://images.unsplash.com/photo-1528909514045-2fa4ac7a08ba" class="h-64 w-full object-cover">
      <div class="p-6">
        <h3 class="font-bold text-xl">丽江悦榕庄</h3>
        <p class="text-gray-500 mt-2">★★★★★</p>
        <p class="text-red-500 font-bold mt-2">¥1288起</p>
        <a href="hotel-detail.html" class="text-emerald-600 mt-3 inline-block">查看详情 →</a>
      </div>
    </div>

    <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:-translate-y-2 transition">
      <img src="https://images.unsplash.com/photo-1528127269322-539801943592" class="h-64 w-full object-cover">
      <div class="p-6">
        <h3 class="font-bold text-xl">丽江古城客栈</h3>
        <p class="text-gray-500 mt-2">★★★★☆</p>
        <p class="text-red-500 font-bold mt-2">¥680起</p>
        <a href="hotel-detail.html" class="text-emerald-600 mt-3 inline-block">查看详情 →</a>
      </div>
    </div>

    <div class="bg-white rounded-3xl overflow-hidden shadow-lg hover:-translate-y-2 transition">
      <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="h-64 w-full object-cover">
      <div class="p-6">
        <h3 class="font-bold text-xl">丽江纳西客栈</h3>
        <p class="text-gray-500 mt-2">★★★★☆</p>
        <p class="text-red-500 font-bold mt-2">¥720起</p>
        <a href="hotel-detail.html" class="text-emerald-600 mt-3 inline-block">查看详情 →</a>
      </div>
    </div>

    <!-- 可以复制更多卡片 -->
  </div>
</section>

<!-- 分页 -->
<section class="max-w-7xl mx-auto pb-20 flex justify-center gap-3">
  <button class="w-12 h-12 rounded-xl bg-emerald-600 text-white">1</button>
  <button class="w-12 h-12 rounded-xl bg-white shadow">2</button>
  <button class="w-12 h-12 rounded-xl bg-white shadow">3</button>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-white mt-20">
  <div class="max-w-7xl mx-auto py-16 px-6 text-center">
    <h3 class="text-3xl font-bold">云南旅游官网</h3>
    <p class="mt-4 text-gray-400">探索彩云之南 · 发现最美云南</p>
    <p class="mt-6 text-gray-500">© 2026 Yunnan Travel</p>
  </div>
</footer>

</body>
</html>
