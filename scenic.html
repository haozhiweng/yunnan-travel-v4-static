<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云南景点 - 云南旅游官网</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#f5f7fa; }
.scenic-card { transition:.3s; }
.scenic-card:hover { transform:translateY(-4px); box-shadow:0 12px 28px rgba(0,0,0,.15); }
</style>
</head>
<body>

<!-- Header -->
<header class="bg-white shadow p-4 flex justify-between items-center sticky top-0 z-50">
<div class="text-2xl font-bold">云南旅游官网</div>
<nav class="space-x-4">
<a href="index.html" class="text-gray-700 hover:text-emerald-600">首页</a>
<a href="scenic.html" class="text-emerald-600 font-bold">景点</a>
<a href="hotel.html" class="text-gray-700 hover:text-emerald-600">酒店</a>
<a href="ai.html" class="text-gray-700 hover:text-emerald-600">AI规划</a>
<a href="community.html" class="text-gray-700 hover:text-emerald-600">攻略社区</a>
</nav>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-6">

<!-- Banner + 搜索 -->
<section class="relative h-[320px] rounded-2xl overflow-hidden">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-black/40"></div>
<div class="absolute inset-0 flex flex-col justify-center items-center text-white">
<h1 class="text-5xl font-bold mb-2">云南必玩景点</h1>
<p class="text-xl">探索彩云之南</p>
</div>
</section>

<section class="max-w-7xl mx-auto -mt-16 relative z-10">
<div class="bg-white rounded-2xl shadow-lg p-6">
<div class="grid md:grid-cols-4 gap-4">
<input type="text" placeholder="搜索景点" class="border rounded-lg p-3">
<select class="border rounded-lg p-3">
<option>全部城市</option>
<option>丽江</option>
<option>大理</option>
<option>香格里拉</option>
<option>西双版纳</option>
</select>
<button class="bg-emerald-600 text-white rounded-lg">搜索</button>
</div>
</div>
</section>

<!-- 分类筛选 -->
<section class="max-w-7xl mx-auto py-6 px-6 flex flex-wrap gap-4">
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">全部</button>
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">自然风光</button>
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">古镇古城</button>
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">民族文化</button>
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">亲子游</button>
<button class="bg-white px-4 py-2 rounded-full shadow text-gray-700">摄影圣地</button>
</section>

<!-- 热门景点瀑布流 -->
<section class="max-w-7xl mx-auto py-6 px-6 grid md:grid-cols-2 lg:grid-cols-3 gap-6">
<a href="scenic-detail.html?id=1" class="scenic-card bg-white rounded-2xl shadow overflow-hidden">
<img src="https://images.unsplash.com/photo-1566073771259-6a8506099945" class="w-full h-56 object-cover">
<div class="p-4">
<h3 class="font-bold text-xl mb-1">玉龙雪山</h3>
<div class="text-yellow-500 mb-2">★★★★★ 5A景区</div>
<p class="text-gray-500">门票 ¥180</p>
<p class="text-gray-500">丽江</p>
</div>
</a>

<a href="scenic-detail.html?id=2" class="scenic-card bg-white rounded-2xl shadow overflow-hidden">
<img src="https://images.unsplash.com/photo-1522708323590-d24dbb6b0267" class="w-full h-56 object-cover">
<div class="p-4">
<h3 class="font-bold text-xl mb-1">洱海</h3>
<div class="text-yellow-500 mb-2">★★★★★ 自然风光</div>
<p class="text-gray-500">门票 ¥60</p>
<p class="text-gray-500">大理</p>
</div>
</a>

<a href="scenic-detail.html?id=3" class="scenic-card bg-white rounded-2xl shadow overflow-hidden">
<img src="https://images.unsplash.com/photo-1445019980597-93fa8acb246c" class="w-full h-56 object-cover">
<div class="p-4">
<h3 class="font-bold text-xl mb-1">泸沽湖</h3>
<div class="text-yellow-500 mb-2">★★★★★ 自然风光</div>
<p class="text-gray-500">门票 ¥90</p>
<p class="text-gray-500">丽江</p>
</div>
</a>

<a href="scenic-detail.html?id=4" class="scenic-card bg-white rounded-2xl shadow overflow-hidden">
<img src="https://images.unsplash.com/photo-1582719508461-905c673771fd" class="w-full h-56 object-cover">
<div class="p-4">
<h3 class="font-bold text-xl mb-1">西双版纳热带植物园</h3>
<div class="text-yellow-500 mb-2">★★★★★ 自然风光</div>
<p class="text-gray-500">门票 ¥50</p>
<p class="text-gray-500">西双版纳</p>
</div>
</a>
</section>

<!-- 推荐路线 -->
<section class="max-w-7xl mx-auto py-6 px-6">
<h2 class="text-3xl font-bold mb-6">推荐路线</h2>
<div class="grid md:grid-cols-2 lg:grid-cols-4 gap-6">
<a href="ai.html" class="bg-white rounded-2xl shadow p-4 hover:shadow-lg">
<h3 class="font-bold text-lg mb-2">丽江3日游</h3>
<p class="text-gray-500">涵盖玉龙雪山、束河古镇、泸沽湖</p>
</a>
<a href="ai.html" class="bg-white rounded-2xl shadow p-4 hover:shadow-lg">
<h3 class="font-bold text-lg mb-2">大理2日游</h3>
<p class="text-gray-500">涵盖洱海、蝴蝶泉、古城</p>
</a>
<a href="ai.html" class="bg-white rounded-2xl shadow p-4 hover:shadow-lg">
<h3 class="font-bold text-lg mb-2">香格里拉4日游</h3>
<p class="text-gray-500">涵盖松赞林寺、普达措国家公园</p>
</a>
<a href="ai.html" class="bg-white rounded-2xl shadow p-4 hover:shadow-lg">
<h3 class="font-bold text-lg mb-2">西双版纳5日游</h3>
<p class="text-gray-500">涵盖热带植物园、原始森林、傣族村寨</p>
</a>
</div>
</section>

<!-- 地图 -->
<section class="max-w-7xl mx-auto py-6 px-6">
<h2 class="text-3xl font-bold mb-4">云南热门景点地图</h2>
<iframe class="w-full h-96 rounded-xl shadow" src="https://maps.google.com/maps?q=Yunnan%20China&t=&z=7&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

<!-- Footer -->
<footer class="bg-gray-900 text-white text-center p-6 mt-12">
© 2026 云南旅游官网
</footer>

</body>
</html>
