<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI行程规划 - 云南旅游官网 V3.0</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { background:#f5f7fa; }
.plan-card { transition:.3s; }
.plan-card:hover { transform:translateY(-4px); box-shadow:0 12px 28px rgba(0,0,0,.15); }
</style>
</head>

<body>

<!-- Header -->
<header class="bg-white shadow sticky top-0 z-50">
<div class="max-w-7xl mx-auto flex justify-between items-center px-6 py-4">
<div class="text-2xl font-bold text-emerald-600">云南旅游官网</div>
<nav class="space-x-4">
<a href="index.html" class="text-gray-700 hover:text-emerald-600">首页</a>
<a href="scenic.html" class="text-gray-700 hover:text-emerald-600">景点</a>
<a href="hotel.html" class="text-gray-700 hover:text-emerald-600">酒店</a>
<a href="community.html" class="text-gray-700 hover:text-emerald-600">攻略社区</a>
<a href="ai.html" class="text-emerald-600 font-bold">AI规划</a>
</nav>
</div>
</header>

<main class="max-w-7xl mx-auto p-6 space-y-6">

<!-- Banner + 输入 -->
<section class="relative h-[300px] rounded-2xl overflow-hidden">
<img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb" class="w-full h-full object-cover">
<div class="absolute inset-0 bg-black/40"></div>
<div class="absolute inset-0 flex flex-col justify-center items-center text-white">
<h1 class="text-5xl font-bold mb-2">AI行程规划助手</h1>
<p class="text-xl mb-4">自动生成云南旅游行程</p>
<div class="w-full max-w-2xl grid gap-4">
<input id="destinations" type="text" placeholder="输入景点或城市，用逗号分隔" class="p-3 rounded-lg border w-full">
<input id="days" type="number" min="1" placeholder="出行天数" class="p-3 rounded-lg border w-full">
<select id="people" class="p-3 rounded-lg border w-full">
<option>1位成人</option>
<option>2位成人</option>
<option>2位成人 + 1位儿童</option>
<option>3位成人</option>
</select>
<button onclick="generatePlan()" class="bg-emerald-600 text-white py-3 rounded-lg font-bold">生成行程</button>
</div>
</div>
</section>

<!-- 生成行程 -->
<section id="planResult" class="max-w-7xl mx-auto py-6 px-6 space-y-6">
<!-- AI生成结果显示区域 -->
</section>

</main>

<!-- Footer -->
<footer class="bg-gray-900 text-white text-center p-6 mt-12">
© 2026 云南旅游官网
</footer>

<script>
function generatePlan(){
const destinations=document.getElementById('destinations').value.split(',');
const days=parseInt(document.getElementById('days').value)||1;
const people=document.getElementById('people').value;
const container=document.getElementById('planResult');
container.innerHTML='';

for(let d=1; d<=days; d++){
const dayCard=document.createElement('div');
dayCard.className='plan-card bg-white rounded-2xl shadow p-6';
dayCard.innerHTML=`<h2 class="text-2xl font-bold mb-3">第${d}天</h2>
<ul class="list-disc pl-5 space-y-2">
${destinations.map(dest=>`<li>${dest.trim()}景点游玩</li>`).join('')}
</ul>`;
container.appendChild(dayCard);
}

// 添加打印/保存按钮
const btnSave=document.createElement('button');
btnSave.className='bg-blue-600 text-white px-6 py-3 rounded-lg font-bold';
btnSave.innerText='打印行程';
btnSave.onclick=()=>window.print();
container.appendChild(btnSave);
}
</script>

</body>
</html>
</body>

</html>
