<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 行程规划助手 - 云南旅游官网</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

<header class="bg-green-600 text-white p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">云南旅游官网</h1>
  <nav class="space-x-4">
    <a href="index.html" class="hover:underline">首页</a>
    <a href="scenic.html" class="hover:underline">景点</a>
    <a href="hotel.html" class="hover:underline">酒店</a>
    <a href="community.html" class="hover:underline">攻略社区</a>
    <a href="ai.html" class="underline">AI规划</a>
  </nav>
</header>

<main class="max-w-4xl mx-auto mt-10 p-4">
  <section class="bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-3xl font-bold mb-4">AI 行程规划助手</h2>
    <p class="mb-6 text-gray-600">自动生成云南旅游行程，数据通过安全代理调用 OpenAI API</p>

    <div class="space-y-4">
      <input id="destinations" type="text" placeholder="输入景点或城市，用逗号分隔" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
      <input id="days" type="number" placeholder="出行天数" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
      <input id="budget" type="text" placeholder="预算（可选）" class="w-full p-3 border rounded-md focus:outline-none focus:ring-2 focus:ring-green-400">
      <button id="generateBtn" class="w-full bg-green-600 text-white p-3 rounded-md hover:bg-green-700 transition">生成行程</button>
    </div>
  </section>

  <section id="result" class="mt-8 bg-white p-6 rounded-xl shadow-md hidden">
    <h3 class="text-2xl font-bold mb-4">生成的行程</h3>
    <div id="itinerary" class="space-y-4 text-gray-700"></div>
  </section>
</main>

<footer class="bg-gray-900 text-white text-center p-6 mt-10">
  © 2026 云南旅游官网
</footer>

<script>
document.getElementById('generateBtn').addEventListener('click', async () => {
  const destinations = document.getElementById('destinations').value
  const days = document.getElementById('days').value
  const budget = document.getElementById('budget').value

  if (!destinations || !days) {
    alert('请填写景点和出行天数')
    return
  }

  const resultSection = document.getElementById('result')
  const itineraryDiv = document.getElementById('itinerary')
  resultSection.classList.remove('hidden')
  itineraryDiv.innerHTML = '正在生成，请稍候...'

  try {
    const response = await fetch('https://你的-worker-地址.ai-generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ destinations, days, budget })
    })
    const data = await response.json()
    itineraryDiv.innerHTML = ''

    if (data && data.itinerary) {
      data.itinerary.forEach((day, index) => {
        const div = document.createElement('div')
        div.className = 'p-4 border-l-4 border-green-600 bg-green-50 rounded-md'
        div.innerHTML = `<strong>Day ${index + 1}:</strong> ${day}`
        itineraryDiv.appendChild(div)
      })
    } else {
      itineraryDiv.innerHTML = '生成失败，请稍后重试'
    }
  } catch (err) {
    console.error(err)
    itineraryDiv.innerHTML = '生成失败，请检查网络或联系管理员'
  }
})
</script>

</body>
</html>
