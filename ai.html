<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI智能行程规划 - 云南旅游官网</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

<!-- Header -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <a href="index.html" class="text-2xl font-bold text-emerald-600">云南旅游官网</a>
  <nav class="space-x-4 text-gray-700">
    <a href="index.html">首页</a>
    <a href="scenic.html">景点</a>
    <a href="hotel.html">酒店</a>
    <a href="community.html">攻略社区</a>
    <a href="ai.html" class="font-bold text-emerald-600">AI规划</a>
  </nav>
</header>

<!-- Banner -->
<section class="relative h-[550px] rounded-b-3xl overflow-hidden">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="absolute w-full h-full object-cover">
  <div class="absolute inset-0 bg-black/50"></div>
  <div class="absolute inset-0 flex items-center justify-center">
    <div class="max-w-4xl w-full px-6 text-center">
      <h1 class="text-6xl font-bold text-white mb-4">AI智能行程规划</h1>
      <p class="text-xl text-white mb-8">输入目的地和天数，自动生成云南旅行路线</p>
      <div class="bg-white rounded-2xl p-6 shadow-2xl grid md:grid-cols-3 gap-4">
        <input id="destination" placeholder="输入城市或景点" class="border rounded-xl p-4">
        <input id="days" type="number" min="1" value="3" class="border rounded-xl p-4" placeholder="出行天数">
        <button onclick="generatePlan()" class="bg-emerald-600 text-white rounded-xl font-bold">生成行程</button>
      </div>
    </div>
  </div>
</section>

<!-- AI生成结果 -->
<section id="planResult" class="max-w-6xl mx-auto mt-10 px-6"></section>

<script>
// ⚠️ 替换为你的真实 OpenAI Key
const OPENAI_API_KEY = "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";

async function generatePlan() {
  const city = document.getElementById("destination").value.trim();
  const days = document.getElementById("days").value;

  if (!city || !days) {
    alert("请输入目的地和天数！");
    return;
  }

  const resultDiv = document.getElementById("planResult");
  resultDiv.innerHTML = `<p class="text-center text-gray-500">正在生成，请稍候...</p>`;

  // 调用 OpenAI GPT-4 API
  try {
    const response = await fetch("https://api.openai.com/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${OPENAI_API_KEY}`
      },
      body: JSON.stringify({
        model: "gpt-4",
        messages: [
          {
            role: "system",
            content: "你是云南旅游行程规划助手，返回 HTML 格式行程，每天包含上午、下午、晚上安排。输出 HTML 结构，不要其他文字。"
          },
          {
            role: "user",
            content: `为目的地 "${city}" 生成 ${days} 天的旅行路线，提供每日景点、活动、推荐酒店。`
          }
        ],
        temperature: 0.7,
        max_tokens: 1500
      })
    });

    const data = await response.json();
    const aiHtml = data.choices[0].message.content;

    resultDiv.innerHTML = aiHtml;

  } catch (err) {
    console.error(err);
    resultDiv.innerHTML = `<p class="text-red-500 text-center">生成失败，请稍后重试</p>`;
  }
}
</script>

<footer class="bg-gray-900 text-white text-center p-6 mt-12">
  © 2026 云南旅游官网
</footer>
</body>
</html>
