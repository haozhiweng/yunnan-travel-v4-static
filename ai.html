<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI行程规划 V5.0 - 云南旅游官网</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- Header -->
<header class="bg-white shadow fixed top-0 left-0 right-0 z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center py-4 px-6">
    <a href="index.html" class="text-3xl font-bold text-emerald-600">云南旅游</a>
    <nav class="space-x-8 font-medium">
      <a href="index.html">首页</a>
      <a href="scenic.html">景点</a>
      <a href="hotel.html">酒店</a>
      <a href="community.html">攻略社区</a>
      <a href="ai.html" class="underline">AI行程规划</a>
    </nav>
  </div>
</header>

<main class="max-w-7xl mx-auto mt-24 px-6">

<!-- Banner -->
<section class="relative h-[500px] overflow-hidden rounded-3xl mb-12">
  <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee" class="absolute inset-0 w-full h-full object-cover rounded-3xl">
  <div class="absolute inset-0 bg-black/40 rounded-3xl"></div>
  <div class="relative z-10 flex items-center justify-center h-full">
    <div class="text-center text-white">
      <h1 class="text-6xl font-bold">AI智能行程规划</h1>
      <p class="mt-4 text-xl">根据您的出行需求，自动生成云南最佳旅行路线</p>
    </div>
  </div>
</section>

<!-- 输入区 -->
<section class="bg-white rounded-3xl shadow-xl p-8 mb-10">
  <h2 class="text-3xl font-bold mb-6">填写出行信息</h2>
  <div class="grid md:grid-cols-5 gap-4">
    <input id="fromCity" type="text" placeholder="出发城市" class="border rounded-xl p-4">
    <input id="destinations" type="text" placeholder="目的地/景点，用逗号分隔" class="border rounded-xl p-4">
    <input id="days" type="number" placeholder="出行天数" class="border rounded-xl p-4">
    <select id="people" class="border rounded-xl p-4">
      <option value="1">1人</option>
      <option value="2" selected>2人</option>
      <option value="3">3人</option>
      <option value="4">4人</option>
    </select>
    <button id="generateBtn" class="bg-emerald-600 text-white rounded-xl font-bold hover:bg-emerald-700">生成行程</button>
  </div>
</section>

<!-- 生成结果 -->
<section id="result" class="hidden mb-16">
  <div class="bg-white rounded-3xl shadow p-8">
    <h2 class="text-3xl font-bold mb-6">行程生成结果</h2>
    <div id="itinerary" class="space-y-6 text-gray-700"></div>
  </div>
</section>

</main>

<!-- Footer -->
<footer class="bg-gray-900 text-white mt-20">
  <div class="max-w-7xl mx-auto py-16 px-6 text-center">
    <h3 class="text-3xl font-bold">云南旅游官网</h3>
    <p class="mt-4 text-gray-400">探索彩云之南 · 发现最美云南</p>
    <p class="mt-6 text-gray-500">© 2026 Yunnan Travel</p>
  </div>
</footer>

<!-- JS逻辑 -->
<script>
document.getElementById('generateBtn').addEventListener('click', () => {
  const fromCity = document.getElementById('fromCity').value.trim()
  const destinations = document.getElementById('destinations').value.split(',').map(d=>d.trim()).filter(d=>d)
  const days = parseInt(document.getElementById('days').value)
  const people = parseInt(document.getElementById('people').value)

  if(!fromCity || !destinations.length || !days || !people){ alert('请完整填写信息'); return; }

  const resultSection = document.getElementById('result')
  const itineraryDiv = document.getElementById('itinerary')
  resultSection.classList.remove('hidden')
  itineraryDiv.innerHTML = ''

  // 模拟每日行程和预算
  let totalBudget = 0
  for(let i=1;i<=days;i++){
    const dayDest = destinations[(i-1)%destinations.length]
    const dayBudget = Math.floor(Math.random()*300 + 500) * people
    totalBudget += dayBudget

    const dayDiv = document.createElement('div')
    dayDiv.className='p-6 border-l-4 border-emerald-600 rounded-xl bg-emerald-50'

    dayDiv.innerHTML = `
      <div class="flex justify-between items-center mb-2">
        <h3 class="font-bold text-xl">第${i}天</h3>
        <span class="text-red-500 font-bold">预算 ¥${dayBudget}</span>
      </div>
      <p>上午：<a href="scenic-detail.html" class="text-emerald-600 hover:underline">${dayDest}景点</a> 游玩</p>
      <p>下午：当地特色美食体验</p>
      <p>晚上：入住 <a href="hotel-detail.html" class="text-emerald-600 hover:underline">附近酒店</a></p>
    `
    itineraryDiv.appendChild(dayDiv)
  }

  // 总预算和打印按钮
  const summaryDiv = document.createElement('div')
  summaryDiv.className='bg-yellow-50 p-6 rounded-xl mt-6 text-center'
  summaryDiv.innerHTML = `
    <h3 class="text-2xl font-bold mb-3">总预算预估：¥${totalBudget}</h3>
    <button onclick="window.print()" class="bg-emerald-600 text-white px-8 py-3 rounded-xl hover:bg-emerald-700">🖨 打印行程</button>
  `
  itineraryDiv.appendChild(summaryDiv)
})
</script>

</body>
</html>
