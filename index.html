<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>云南旅游官网</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">

<!-- 头部导航 -->
<header class="bg-white shadow fixed w-full z-50">
  <div class="max-w-7xl mx-auto flex justify-between items-center p-4">
    <div class="text-2xl font-bold text-green-700">云南旅游</div>
    <nav class="space-x-4">
      <a href="index.html" class="text-gray-700 hover:text-green-700">首页</a>
      <a href="scenic.html" class="text-gray-700 hover:text-green-700">景点</a>
      <a href="hotel.html" class="text-gray-700 hover:text-green-700">酒店</a>
      <a href="ai.html" class="text-gray-700 hover:text-green-700">AI行程规划</a>
      <a href="community.html" class="text-gray-700 hover:text-green-700">攻略社区</a>
      <a href="#" class="text-gray-700 hover:text-green-700">行程</a>
      <a href="#" class="text-gray-700 hover:text-green-700">关于云南</a>
    </nav>
    <div>
      <button class="border border-green-700 text-green-700 px-4 py-1 rounded hover:bg-green-700 hover:text-white transition">登录/注册</button>
    </div>
  </div>
</header>

<!-- Banner -->
<section class="relative h-screen bg-cover bg-center" style="background-image:url('assets/images/banner/banner.jpg');">
  <div class="absolute inset-0 bg-black bg-opacity-30"></div>
  <div class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-4">
    <h1 class="text-5xl font-bold mb-4">心之所向，梦之云南</h1>
    <p class="text-xl mb-8">遇见彩云之南，探索自然与人文的完美融合</p>
    <div class="bg-white bg-opacity-90 rounded-xl p-4 w-full max-w-3xl">
      <form class="flex flex-col md:flex-row gap-2">
        <input type="text" placeholder="目的地 / 景点 / 酒店" class="flex-1 p-2 border rounded">
        <input type="date" class="p-2 border rounded">
        <input type="date" class="p-2 border rounded">
        <button type="submit" class="bg-green-700 text-white px-4 rounded">搜索</button>
      </form>
      <div class="mt-2 text-sm text-gray-700">热门搜索：丽江古城、泸沽湖、玉龙雪山、大理古城、香格里拉</div>
    </div>
  </div>
</section>

<!-- 功能入口 -->
<section class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-6 gap-4 mt-12 px-4">
  <div class="text-center p-4 bg-white rounded shadow">景点浏览</div>
  <div class="text-center p-4 bg-white rounded shadow">AI行程规划</div>
  <div class="text-center p-4 bg-white rounded shadow">酒店预订</div>
  <div class="text-center p-4 bg-white rounded shadow">攻略社区</div>
  <div class="text-center p-4 bg-white rounded shadow">行程分享</div>
  <div class="text-center p-4 bg-white rounded shadow">响应式设计</div>
</section>

<!-- 热门目的地 -->
<section class="max-w-7xl mx-auto px-4 mt-12">
  <h2 class="text-3xl font-bold mb-6">热门目的地</h2>
  <div class="grid md:grid-cols-5 gap-6">
    <a href="scenic.html" class="bg-white rounded shadow p-4 hover:shadow-lg transition">
      <img src="assets/images/scenic/1.jpg" alt="丽江古城" class="rounded mb-2">
      <h3 class="font-bold">丽江古城</h3>
      <p class="text-gray-600 text-sm">热门景点推荐</p>
      <p class="text-gray-500 text-xs">丽江市</p>
    </a>
    <a href="scenic.html" class="bg-white rounded shadow p-4 hover:shadow-lg transition">
      <img src="assets/images/scenic/2.jpg" alt="大理古城" class="rounded mb-2">
      <h3 class="font-bold">大理古城</h3>
      <p class="text-gray-600 text-sm">自由行精选</p>
      <p class="text-gray-500 text-xs">大理白族自治州</p>
    </a>
    <a href="scenic.html" class="bg-white rounded shadow p-4 hover:shadow-lg transition">
      <img src="assets/images/scenic/3.jpg" alt="玉龙雪山" class="rounded mb-2">
      <h3 class="font-bold">玉龙雪山</h3>
      <p class="text-gray-600 text-sm">壮丽雪山风光</p>
      <p class="text-gray-500 text-xs">丽江市</p>
    </a>
    <a href="scenic.html" class="bg-white rounded shadow p-4 hover:shadow-lg transition">
      <img src="assets/images/scenic/4.jpg" alt="泸沽湖" class="rounded mb-2">
      <h3 class="font-bold">泸沽湖</h3>
      <p class="text-gray-600 text-sm">高原明珠</p>
      <p class="text-gray-500 text-xs">丽江市</p>
    </a>
    <a href="scenic.html" class="bg-white rounded shadow p-4 hover:shadow-lg transition">
      <img src="assets/images/scenic/5.jpg" alt="香格里拉" class="rounded mb-2">
      <h3 class="font-bold">香格里拉</h3>
      <p class="text-gray-600 text-sm">深度游路线</p>
      <p class="text-gray-500 text-xs">迪庆藏族自治州</p>
    </a>
  </div>
</section>

<!-- 底部 -->
<footer class="bg-gray-900 text-white text-center p-6 mt-12">
  © 2026 云南旅游官网
</footer>

</body>
</html>
